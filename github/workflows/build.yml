name: build epub

on:
 push:

jobs:
 build:
  runs-on: ubuntu-latest

  steps:
  - uses: actions/checkout@v3

  - name: install pandoc
    run: sudo apt-get install pandoc

  - name: build epub
    run: pandoc book.md --metadata-file=metadata.yaml -o pamphlet.epub

  - uses: actions/upload-artifact@v4
    with:
      name: epub
      path: pamphlet.epub
